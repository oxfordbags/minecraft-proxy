services:
  minecraft-proxy:
    image: nginx:latest
    container_name: minecraft-proxy
    # Host networking so the container binds the game ports directly and can
    # reach the backend over the Tailscale interface without extra plumbing.
    network_mode: host
    environment:
      # BACKEND_IP comes from .env (copy .env.example). The nginx entrypoint
      # renders templates/*.template through envsubst; NGINX_ENVSUBST_FILTER
      # limits substitution to our BACKEND_ vars so no nginx $variables break.
      - BACKEND_IP=${BACKEND_IP:?set BACKEND_IP in .env (see .env.example)}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - NGINX_ENVSUBST_FILTER=BACKEND_
    volumes:
      - ./templates:/etc/nginx/templates:ro
    restart: always
